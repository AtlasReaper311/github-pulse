# github-pulse // Cloudflare Worker configuration

name = "github-pulse"
main = "src/public-boundary.js"
compatibility_date = "2025-09-01"

workers_dev = false

routes = [
  { pattern = "api.atlas-systems.uk/pulse*", zone_id = "8ba6350a78c988447c111048b125f917" }
]

[observability]
enabled = true

# Plain config lives here; only credentials go through wrangler secret.
[vars]
GITHUB_USER = "AtlasReaper311"
ALLOWED_ORIGINS = "https://atlas-systems.uk,https://www.atlas-systems.uk,https://status.atlas-systems.uk,http://localhost:8788"
CACHE_TTL_SECONDS = "3600"
WORKFLOW_TTL_SECONDS = "300"
NOTIFY_URL = "https://api.atlas-systems.uk/notify"

[[kv_namespaces]]
binding = "PULSE_CACHE"
id = "5664a9475b92499c8ee22a7e820a76fd"

# Secrets (set with interactive prompts only):
#   GITHUB_TOKEN     required; repository read access. Private repository access
#                    contributes only to anonymous aggregate commit counts.
#   NOTIFY_TOKEN     optional; shared token for atlas-notify.
