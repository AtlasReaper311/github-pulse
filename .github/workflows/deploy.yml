name: deploy

# Dormant by design. The decisions log (decisions.md) keeps the Actions
# pattern documented but not firing; this workflow matches that posture.
#
# To go live:
#   1. Add a repo secret CLOUDFLARE_API_TOKEN
#      (Cloudflare dashboard > My Profile > API Tokens > "Edit Cloudflare Workers" template)
#   2. Replace the `on:` block with:
#        on:
#          push:
#            branches: [main]
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
